name: CI & Auto-Merge

on:
  push:
    branches-ignore:
      - main # We generally want to avoid direct pushes to main
  pull_request:
    branches: [ "main" ]

jobs:
  check-code:
    name: Code Quality & Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        # If there is a type error, it stops here and prevents merge
        run: npx tsc --noEmit

      # If you had tests, they could be added here:
      # - name: Run Tests
      #   run: npm test

  # This job only runs if check-code is successful
  automerge:
    name: Auto Merge to Main
    needs: check-code
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Enable Auto-Merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          # You need to grant Action permissions in GitHub settings for this to work
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
